<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="12" fill="#f0f4f8"/>
  <!-- Whiteboard / screen -->
  <rect x="100" y="30" width="200" height="130" rx="6" fill="white" stroke="#1a365d" stroke-width="2"/>
  <!-- Screen header bar -->
  <rect x="100" y="30" width="200" height="22" rx="6" fill="#1a365d"/>
  <rect x="100" y="46" width="200" height="6" fill="#1a365d"/>
  <text x="200" y="45" font-family="sans-serif" font-size="10" fill="white" text-anchor="middle" font-weight="bold">AI Workshop</text>
  <!-- Neural network diagram on screen -->
  <!-- Input layer -->
  <circle cx="145" cy="75" r="6" fill="#c8a951"/>
  <circle cx="145" cy="95" r="6" fill="#c8a951"/>
  <circle cx="145" cy="115" r="6" fill="#c8a951"/>
  <!-- Hidden layer -->
  <circle cx="200" cy="70" r="6" fill="#1a365d"/>
  <circle cx="200" cy="90" r="6" fill="#1a365d"/>
  <circle cx="200" cy="110" r="6" fill="#1a365d"/>
  <circle cx="200" cy="130" r="6" fill="#1a365d"/>
  <!-- Output layer -->
  <circle cx="255" cy="85" r="6" fill="#c8a951"/>
  <circle cx="255" cy="105" r="6" fill="#c8a951"/>
  <!-- Connections input to hidden -->
  <line x1="151" y1="75" x2="194" y2="70" stroke="#1a365d" stroke-width="0.8" opacity="0.4"/>
  <line x1="151" y1="75" x2="194" y2="90" stroke="#1a365d" stroke-width="0.8" opacity="0.4"/>
  <line x1="151" y1="75" x2="194" y2="110" stroke="#1a365d" stroke-width="0.8" opacity="0.4"/>
  <line x1="151" y1="95" x2="194" y2="70" stroke="#1a365d" stroke-width="0.8" opacity="0.4"/>
  <line x1="151" y1="95" x2="194" y2="90" stroke="#1a365d" stroke-width="0.8" opacity="0.4"/>
  <line x1="151" y1="95" x2="194" y2="110" stroke="#1a365d" stroke-width="0.8" opacity="0.4"/>
  <line x1="151" y1="95" x2="194" y2="130" stroke="#1a365d" stroke-width="0.8" opacity="0.4"/>
  <line x1="151" y1="115" x2="194" y2="90" stroke="#1a365d" stroke-width="0.8" opacity="0.4"/>
  <line x1="151" y1="115" x2="194" y2="110" stroke="#1a365d" stroke-width="0.8" opacity="0.4"/>
  <line x1="151" y1="115" x2="194" y2="130" stroke="#1a365d" stroke-width="0.8" opacity="0.4"/>
  <!-- Connections hidden to output -->
  <line x1="206" y1="70" x2="249" y2="85" stroke="#c8a951" stroke-width="0.8" opacity="0.5"/>
  <line x1="206" y1="70" x2="249" y2="105" stroke="#c8a951" stroke-width="0.8" opacity="0.5"/>
  <line x1="206" y1="90" x2="249" y2="85" stroke="#c8a951" stroke-width="0.8" opacity="0.5"/>
  <line x1="206" y1="90" x2="249" y2="105" stroke="#c8a951" stroke-width="0.8" opacity="0.5"/>
  <line x1="206" y1="110" x2="249" y2="85" stroke="#c8a951" stroke-width="0.8" opacity="0.5"/>
  <line x1="206" y1="110" x2="249" y2="105" stroke="#c8a951" stroke-width="0.8" opacity="0.5"/>
  <line x1="206" y1="130" x2="249" y2="105" stroke="#c8a951" stroke-width="0.8" opacity="0.5"/>
  <!-- Table surface -->
  <rect x="60" y="195" width="280" height="8" rx="2" fill="#1a365d" opacity="0.15"/>
  <!-- Coffee cup -->
  <rect x="80" y="178" width="18" height="17" rx="3" fill="#c8a951" opacity="0.5"/>
  <path d="M98 183 Q105 183 105 188 Q105 193 98 193" stroke="#c8a951" stroke-width="1.5" fill="none" opacity="0.5"/>
  <!-- Laptop left -->
  <rect x="115" y="170" width="50" height="32" rx="3" fill="#1a365d"/>
  <rect x="119" y="174" width="42" height="22" rx="2" fill="#e8eef5"/>
  <rect x="125" y="178" width="20" height="3" rx="1" fill="#c8a951" opacity="0.5"/>
  <rect x="125" y="184" width="30" height="3" rx="1" fill="#1a365d" opacity="0.2"/>
  <rect x="125" y="190" width="15" height="3" rx="1" fill="#1a365d" opacity="0.2"/>
  <rect x="108" y="202" width="64" height="4" rx="1" fill="#1a365d" opacity="0.7"/>
  <!-- Laptop right -->
  <rect x="235" y="170" width="50" height="32" rx="3" fill="#1a365d"/>
  <rect x="239" y="174" width="42" height="22" rx="2" fill="#e8eef5"/>
  <rect x="245" y="178" width="24" height="3" rx="1" fill="#c8a951" opacity="0.5"/>
  <rect x="245" y="184" width="18" height="3" rx="1" fill="#1a365d" opacity="0.2"/>
  <rect x="245" y="190" width="30" height="3" rx="1" fill="#1a365d" opacity="0.2"/>
  <rect x="228" y="202" width="64" height="4" rx="1" fill="#1a365d" opacity="0.7"/>
  <!-- Notepad center -->
  <rect x="180" y="175" width="40" height="28" rx="2" fill="white" stroke="#1a365d" stroke-width="1"/>
  <rect x="184" y="180" width="25" height="2" rx="1" fill="#1a365d" opacity="0.3"/>
  <rect x="184" y="185" width="30" height="2" rx="1" fill="#1a365d" opacity="0.3"/>
  <rect x="184" y="190" width="20" height="2" rx="1" fill="#1a365d" opacity="0.3"/>
  <rect x="184" y="195" width="28" height="2" rx="1" fill="#c8a951" opacity="0.4"/>
  <!-- Lightbulb icon -->
  <circle cx="55" cy="88" r="16" fill="#c8a951" opacity="0.15"/>
  <path d="M50 83 Q50 74 55 74 Q60 74 60 83 Q60 89 57 90 L57 95 L53 95 L53 90 Q50 89 50 83Z" fill="#c8a951" opacity="0.6"/>
  <!-- Question mark icon -->
  <circle cx="345" cy="100" r="14" fill="#1a365d" opacity="0.1"/>
  <text x="345" y="105" font-family="Georgia, serif" font-size="14" fill="#1a365d" text-anchor="middle" opacity="0.4">?</text>
  <!-- Label -->
  <text x="200" y="235" font-family="Georgia, serif" font-size="16" fill="#1a365d" text-anchor="middle" font-weight="bold">AI Lunch &amp; Learns</text>
  <text x="200" y="255" font-family="sans-serif" font-size="11" fill="#6b7b8d" text-anchor="middle">Team Training &amp; Workshops</text>
</svg>
