<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="12" fill="#f0f4f8"/>
  <!-- Monitor -->
  <rect x="110" y="50" width="180" height="120" rx="8" fill="#1a365d"/>
  <rect x="118" y="58" width="164" height="96" rx="4" fill="#e8eef5"/>
  <!-- Screen content: org chart -->
  <circle cx="200" cy="82" r="10" fill="#c8a951"/>
  <line x1="200" y1="92" x2="170" y2="112" stroke="#1a365d" stroke-width="2"/>
  <line x1="200" y1="92" x2="200" y2="112" stroke="#1a365d" stroke-width="2"/>
  <line x1="200" y1="92" x2="230" y2="112" stroke="#1a365d" stroke-width="2"/>
  <circle cx="170" cy="118" r="7" fill="#1a365d"/>
  <circle cx="200" cy="118" r="7" fill="#1a365d"/>
  <circle cx="230" cy="118" r="7" fill="#1a365d"/>
  <line x1="170" y1="125" x2="155" y2="140" stroke="#c8a951" stroke-width="1.5"/>
  <line x1="170" y1="125" x2="185" y2="140" stroke="#c8a951" stroke-width="1.5"/>
  <line x1="230" y1="125" x2="215" y2="140" stroke="#c8a951" stroke-width="1.5"/>
  <line x1="230" y1="125" x2="245" y2="140" stroke="#c8a951" stroke-width="1.5"/>
  <circle cx="155" cy="145" r="5" fill="#c8a951" opacity="0.6"/>
  <circle cx="185" cy="145" r="5" fill="#c8a951" opacity="0.6"/>
  <circle cx="215" cy="145" r="5" fill="#c8a951" opacity="0.6"/>
  <circle cx="245" cy="145" r="5" fill="#c8a951" opacity="0.6"/>
  <!-- Stand -->
  <rect x="175" y="170" width="50" height="8" rx="2" fill="#1a365d"/>
  <rect x="185" y="178" width="30" height="15" rx="0" fill="#1a365d" opacity="0.7"/>
  <rect x="160" y="193" width="80" height="6" rx="3" fill="#1a365d"/>
  <!-- Gear icons -->
  <circle cx="80" cy="100" r="18" fill="none" stroke="#c8a951" stroke-width="2.5" stroke-dasharray="8 4"/>
  <circle cx="80" cy="100" r="8" fill="#c8a951" opacity="0.3"/>
  <circle cx="320" cy="130" r="14" fill="none" stroke="#1a365d" stroke-width="2" stroke-dasharray="6 3"/>
