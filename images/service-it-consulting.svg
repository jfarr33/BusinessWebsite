  <!-- Label -->
  <text x="200" y="240" font-family="Georgia, serif" font-size="16" fill="#1a365d" text-anchor="middle" font-weight="bold">IT Consulting</text>
  <text x="200" y="260" font-family="sans-serif" font-size="11" fill="#6b7b8d" text-anchor="middle">Strategy &amp; Architecture</text>
